name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package (editable) with dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format (check only)
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src/registral_dispersion

      - name: Unit tests with coverage
        run: pytest tests/ -v --tb=short --cov=registral_dispersion --cov-report=term-missing --cov-fail-under=55
